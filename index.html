<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta property="og:description" content="Пакеты, канцтовары, игрушки, хозтовары и аксессуары оптом и в розницу">

    <meta name="theme-color" content="#5b8fa8">
    <link rel="manifest" href="manifest.json">
    <title>kosmos - Магазин</title>
    <style>
/* ================================================
   DESIGN TOKENS — единая система переменных
   ================================================ */
:root {
    /* Цвета */
    --c-bg:          #080c10;
    --c-surface-1:   #0f1419;
    --c-surface-2:   #161d24;
    --c-surface-3:   #1e2830;
    --c-border:      rgba(99,130,150,0.18);
    --c-border-hover:rgba(99,130,150,0.42);
    --c-accent:      #5b8fa8;
    --c-accent-soft: rgba(91,143,168,0.15);
    --c-accent-glow: rgba(91,143,168,0.35);
    --c-red:         #e05252;
    --c-red-soft:    rgba(224,82,82,0.12);
    --c-red-glow:    rgba(224,82,82,0.35);
    --c-green:       #3dba7e;
    --c-green-soft:  rgba(61,186,126,0.12);
    --c-text-1:      #f0f4f8;
    --c-text-2:      #8ca0b0;
    --c-text-3:      #4a5a68;

    /* Радиусы */
    --r-sm:  8px;
    --r-md:  12px;
    --r-lg:  18px;
    --r-xl:  24px;
    --r-full:9999px;

    /* Тени */
    --shadow-card:   0 2px 12px rgba(0,0,0,0.5), 0 1px 3px rgba(0,0,0,0.3);
    --shadow-hover:  0 8px 32px rgba(0,0,0,0.6), 0 2px 8px rgba(91,143,168,0.18);
    --shadow-panel:  -4px 0 40px rgba(0,0,0,0.7);
    --shadow-btn:    0 2px 8px rgba(0,0,0,0.4);
    --shadow-input:  0 0 0 3px rgba(91,143,168,0.2);

    /* Переходы */
    --t-fast:  0.15s ease;
    --t-base:  0.25s ease;
    --t-slow:  0.35s cubic-bezier(.4,0,.2,1);

    /* Шрифты */
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
}

/* ================================================
   RESET & BASE
   ================================================ */
*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html {
    scroll-behavior: smooth;
}

html, body {
    width: 100%;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
}

body {
    font-family: var(--font);
    background-color: var(--c-bg);
    color: var(--c-text-1);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
}

/* Кастомный скроллбар */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--c-surface-1); }
::-webkit-scrollbar-thumb { background: var(--c-surface-3); border-radius: var(--r-full); }
::-webkit-scrollbar-thumb:hover { background: var(--c-accent); }

/* ================================================
   ФОНОВЫЙ ПАТТЕРН (звёзды + сетка)
   ================================================ */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
        radial-gradient(1px 1px at 10%  15%, rgba(255,255,255,0.55) 0%, transparent 100%),
        radial-gradient(1px 1px at 30%  60%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(2px 2px at 55%  25%, rgba(255,255,255,0.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 70%  80%, rgba(255,255,255,0.3)  0%, transparent 100%),
        radial-gradient(1px 1px at 85%  40%, rgba(255,255,255,0.4)  0%, transparent 100%),
        radial-gradient(1px 1px at 20%  85%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 92%  70%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(2px 2px at 45%  92%, rgba(255,255,255,0.2)  0%, transparent 100%);
    background-size: 300px 300px;
    animation: starsTwinkle 8s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
}

body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(rgba(91,143,168,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,143,168,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
}

@keyframes starsTwinkle {
    0%   { opacity: 0.4; }
    100% { opacity: 0.8; }
}

/* ================================================
   ШАПКА
   ================================================ */
.header {
    position: sticky;
    top: 0;
    z-index: 200;
    background: rgba(8,12,16,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--c-border);
    box-shadow: 0 1px 0 var(--c-border), 0 4px 24px rgba(0,0,0,0.4);
    padding: 14px 0;
}

.header-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px;
    gap: 16px;
    flex-wrap: wrap;
}

.logo {
    font-size: 24px;
    font-weight: 500;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: #ffffff;
    flex-shrink: 0;
    cursor: default;
    text-shadow: 0 0 18px rgba(255,255,255,0.25);
}

/* ================================================
   ПОИСК
   ================================================ */
.search-wrap {
    flex: 1;
    max-width: 480px;
    margin: 0 12px;
    position: relative;
}

.search-input {
    width: 100%;
    padding: 10px 40px 10px 18px;
    background: var(--c-surface-2);
    border: 1px solid var(--c-border);
    border-radius: var(--r-full);
    font-size: 14px;
    font-family: var(--font);
    color: var(--c-text-1);
    outline: none;
    transition: border-color var(--t-base), box-shadow var(--t-base), background var(--t-base);
}

.search-input::placeholder { color: var(--c-text-3); }

.search-input:focus {
    border-color: var(--c-accent);
    background: var(--c-surface-3);
    box-shadow: var(--shadow-input);
}

.search-clear {
    position: absolute;
    right: 13px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--c-text-3);
    font-size: 18px;
    cursor: pointer;
    display: none;
    line-height: 1;
    padding: 2px;
    transition: color var(--t-fast);
}

.search-clear:hover { color: var(--c-text-1); }
.search-clear.visible { display: block; }

.search-results-panel {
    display: none;
    position: absolute;
    top: calc(100% + 10px);
    left: 0;
    right: 0;
    background: var(--c-surface-2);
    border: 1px solid var(--c-border);
    border-radius: var(--r-lg);
    max-height: 420px;
    overflow-y: auto;
    z-index: 500;
    box-shadow: 0 16px 48px rgba(0,0,0,0.7);
}

.search-results-panel.open { display: block; }

.search-count {
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--c-text-3);
    border-bottom: 1px solid var(--c-border);
}

.search-result-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--c-border);
    transition: background var(--t-fast);
}

.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--c-surface-3); }

.search-result-img {
    width: 48px;
    height: 48px;
    object-fit: contain;
    border-radius: var(--r-sm);
    background: var(--c-surface-1);
    flex-shrink: 0;
}

.search-result-placeholder {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    background: var(--c-surface-1);
    border-radius: var(--r-sm);
    flex-shrink: 0;
}

.search-result-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--c-text-1);
    margin-bottom: 3px;
}

.search-result-name mark {
    background: var(--c-accent-soft);
    color: var(--c-accent);
    border-radius: 3px;
    padding: 0 3px;
}

.search-result-price {
    font-size: 13px;
    color: var(--c-text-2);
}

.search-result-cat {
    font-size: 11px;
    color: var(--c-text-3);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
}

.search-empty {
    padding: 24px;
    text-align: center;
    color: var(--c-text-3);
    font-size: 14px;
}

/* ================================================
   КНОПКИ В ШАПКЕ
   ================================================ */
.cart-button,
.fav-header-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--c-surface-2);
    border: 1px solid var(--c-border);
    color: var(--c-text-1);
    padding: 9px 18px;
    border-radius: var(--r-md);
    cursor: pointer;
    font-size: 15px;
    font-family: var(--font);
    transition: background var(--t-base), border-color var(--t-base), box-shadow var(--t-base);
    white-space: nowrap;
}

.cart-button:hover {
    background: var(--c-surface-3);
    border-color: var(--c-accent);
    box-shadow: 0 0 16px var(--c-accent-glow);
}

.fav-header-btn:hover {
    background: var(--c-red-soft);
    border-color: var(--c-red);
    box-shadow: 0 0 16px var(--c-red-glow);
}

.cart-count,
.fav-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 20px;
    height: 20px;
    padding: 0 5px;
    background: var(--c-accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: var(--r-full);
    line-height: 1;
}

@keyframes notifSlideIn {
    from { opacity: 0; transform: translateX(24px); }
    to   { opacity: 1; transform: translateX(0); }
}

/* ================================================
   QR-КНОПКА И МОДАЛ
   ================================================ */
.qr-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 3500;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    align-items: center;
    justify-content: center;
}

.qr-modal.active {
    display: flex;
    animation: fadeIn 0.22s ease;
}

.qr-modal-content {
    background: var(--c-surface-2);
    border: 1px solid var(--c-border);
    border-radius: var(--r-xl);
    padding: 36px 32px 32px;
    text-align: center;
    width: min(360px, calc(100vw - 32px));
    box-shadow: 0 24px 64px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
    animation: slideUp 0.3s cubic-bezier(.4,0,.2,1);
    position: relative;
}

.qr-modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--c-surface-3);
    border: 1px solid var(--c-border);
    border-radius: var(--r-sm);
    color: var(--c-text-2);
    font-size: 16px;
    cursor: pointer;
    transition: background var(--t-fast), color var(--t-fast);
}

.qr-modal-close:hover { background: var(--c-red-soft); color: var(--c-red); }

.qr-logo {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--c-text-1);
    margin-bottom: 6px;
    text-shadow: 0 0 14px rgba(255,255,255,0.2);
}

.qr-subtitle {
    font-size: 12px;
    color: var(--c-text-3);
    margin-bottom: 24px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
}

.qr-frame {
    display: inline-block;
    background: #ffffff;
    border-radius: var(--r-lg);
    padding: 14px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 8px 32px rgba(0,0,0,0.5);
    margin-bottom: 20px;
}

.qr-frame img {
    display: block;
    width: 180px;
    height: 180px;
    border-radius: var(--r-sm);
}

.qr-url {
    font-size: 12px;
    color: var(--c-text-3);
    word-break: break-all;
    background: var(--c-surface-1);
    border: 1px solid var(--c-border);
    border-radius: var(--r-sm);
    padding: 8px 12px;
    margin-bottom: 16px;
    cursor: pointer;
    transition: border-color var(--t-fast);
    user-select: all;
    -webkit-user-select: all;
}

.qr-url:hover { border-color: var(--c-accent); color: var(--c-text-2); }

.qr-share-btn {
    width: 100%;
    background: linear-gradient(135deg, #25d366 0%, #1aab56 100%);
    border: none;
    color: #fff;
    padding: 13px;
    border-radius: var(--r-md);
    font-size: 15px;
    font-weight: 700;
    font-family: var(--font);
    cursor: pointer;
    transition: opacity var(--t-base), transform var(--t-fast);
    box-shadow: 0 4px 16px rgba(37,211,102,0.35);
}

.qr-share-btn:hover { opacity: 0.9; transform: translateY(-1px); }

@keyframes badgeBounce {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.6); }
    55%  { transform: scale(0.85); }
    75%  { transform: scale(1.2); }
    100% { transform: scale(1); }
}

.cart-count.bounce,
.fav-count.bounce {
    animation: badgeBounce 0.42s cubic-bezier(.36,.07,.19,.97) both;
}

/* ================================================
   КОНТЕЙНЕР
   ================================================ */
.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
    display: flex;
    gap: 24px;
    position: relative;
    z-index: 5;
}

/* ================================================
   САЙДБАР
   ================================================ */
.sidebar {
    width: 210px;
    flex-shrink: 0;
    background: var(--c-surface-1);
    border: 1px solid var(--c-border);
    border-radius: var(--r-lg);
    padding: 20px 16px;
    height: fit-content;
    position: sticky;
    top: 80px;
    box-shadow: var(--shadow-card);
}

.sidebar h3 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--c-text-3);
    margin-bottom: 12px;
    padding-left: 4px;
}

.categories-list { list-style: none; }

.categories-list li {
    padding: 9px 12px;
    margin: 3px 0;
    border-radius: var(--r-sm);
    cursor: pointer;
    transition: background var(--t-fast), color var(--t-fast);
    font-size: 14px;
    color: var(--c-text-2);
    border-left: 2px solid transparent;
}

.categories-list li:hover {
    background: var(--c-accent-soft);
    color: var(--c-text-1);
    border-left-color: var(--c-accent);
}

.categories-list li.active {
    background: var(--c-accent-soft);
    color: var(--c-text-1);
    border-left-color: var(--c-accent);
    font-weight: 600;
}

/* ================================================
   ОСНОВНОЙ КОНТЕНТ
   ================================================ */
.main-content { flex: 1; min-width: 0; }

.page { display: none; }
.page.active { display: block; }

.page h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--c-text-1);
    margin-bottom: 20px;
}

/* ================================================
   СЕТКА КАТЕГОРИЙ
   ================================================ */
.categories-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 18px;
    margin-top: 8px;
}

.category-card {
    background: var(--c-surface-1);
    border: 1px solid var(--c-border);
    border-radius: var(--r-lg);
    overflow: hidden;
    cursor: pointer;
    transition: transform var(--t-slow), box-shadow var(--t-slow), border-color var(--t-base);
    box-shadow: var(--shadow-card);
}

.category-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-hover);
    border-color: var(--c-border-hover);
}

.category-card:active { transform: translateY(-2px); }

.category-image {
    width: 100%;
    height: 190px;
    background: var(--c-surface-2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    overflow: hidden;
    position: relative;
}

.category-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(8,12,16,0.5) 0%, transparent 50%);
    pointer-events: none;
}

.category-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
}

.category-card:hover .category-image img { transform: scale(1.04); }

.category-info {
    padding: 14px 16px;
    text-align: center;
}

.category-info h3 {
    font-size: 15px;
    font-weight: 700;
    color: var(--c-text-1);
    margin-bottom: 4px;
}

.category-info p {
    font-size: 13px;
    color: var(--c-text-3);
}

/* ================================================
   ЗАГОЛОВОК КАТЕГОРИИ
   ================================================ */
.category-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
    position: sticky;
    top: 56px;
    z-index: 50;
    background: rgba(8,12,16,0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 12px 0;
    border-bottom: 1px solid var(--c-border);
}

@media (max-width: 768px) {
    .category-header {
        top: 99px; /* шапка ~57px + mobile-cats ~42px */
    }
}

.back-button {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--c-surface-2);
    border: 1px solid var(--c-border);
    color: var(--c-text-1);
    padding: 9px 16px;
    border-radius: var(--r-md);
    cursor: pointer;
    font-size: 14px;
    font-family: var(--font);
    transition: background var(--t-fast), border-color var(--t-fast);
    white-space: nowrap;
}

.back-button:hover {
    background: var(--c-surface-3);
    border-color: var(--c-border-hover);
}

/* ================================================
   СЕТКА ТОВАРОВ
   ================================================ */
.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 20px;
    margin-top: 12px;
}

/* ================================================
   КАРТОЧКА ТОВАРА
   ================================================ */
.product-card {
    position: relative;
    background: var(--c-surface-1);
    border: 1px solid var(--c-border);
    border-radius: var(--r-lg);
    overflow: hidden;
    box-shadow: var(--shadow-card);
    transition: transform var(--t-slow), box-shadow var(--t-slow), border-color var(--t-base);
    display: flex;
    flex-direction: column;
}

.product-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-hover);
    border-color: var(--c-border-hover);
}

.product-image {
    width: 100%;
    height: 200px;
    background: var(--c-surface-2);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
}

.product-image img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    transition: transform 0.4s ease;
}

.product-card:hover .product-image img { transform: scale(1.04); }

.product-info {
    padding: 16px;
    display: flex;
    flex-direction: column;
    flex: 1;
}

.product-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--c-text-1);
    margin-bottom: 5px;
    line-height: 1.3;
}

.product-description {
    font-size: 12px;
    color: var(--c-text-3);
    margin-bottom: 10px;
    line-height: 1.4;
}

.product-price {
    display: flex;
    align-items: baseline;
    gap: 8px;
    font-size: 20px;
    font-weight: 800;
    color: var(--c-text-1);
    margin-bottom: 8px;
}

.product-price-original {
    font-size: 13px;
    font-weight: 400;
    color: var(--c-text-3);
    text-decoration: line-through;
}

/* Кнопка избранного */
.fav-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 36px;
    height: 36px;
    border-radius: var(--r-full);
    background: rgba(8,12,16,0.65);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--c-text-2);
    font-size: 17px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    transition: transform var(--t-fast), background var(--t-fast), border-color var(--t-fast), color var(--t-fast);
}

.fav-btn:hover {
    transform: scale(1.15);
    background: var(--c-red-soft);
    border-color: var(--c-red);
    color: var(--c-red);
}

.fav-btn.active {
    background: var(--c-red-soft);
    border-color: var(--c-red);
    color: var(--c-red);
}

/* Контролы товара */
.product-controls {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-top: auto;
    padding-top: 12px;
}

.quantity-input {
    width: 68px;
    padding: 9px 10px;
    background: var(--c-surface-2);
    border: 1px solid var(--c-border);
    border-radius: var(--r-sm);
    font-size: 14px;
    font-family: var(--font);
    color: var(--c-text-1);
    text-align: center;
    transition: border-color var(--t-fast), box-shadow var(--t-fast);
}

.quantity-input:focus {
    outline: none;
    border-color: var(--c-accent);
    box-shadow: var(--shadow-input);
}

.add-to-cart-button {
    flex: 1;
    background: var(--c-accent-soft);
    border: 1px solid rgba(91,143,168,0.3);
    color: var(--c-text-1);
    padding: 10px 14px;
    border-radius: var(--r-sm);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font);
    transition: background var(--t-base), border-color var(--t-base), box-shadow var(--t-base), transform var(--t-fast);
}

.add-to-cart-button:hover {
    background: rgba(91,143,168,0.28);
    border-color: var(--c-accent);
    box-shadow: 0 0 18px var(--c-accent-glow);
}

.add-to-cart-button:active { transform: scale(0.97); }

/* ================================================
   БОКОВАЯ ПАНЕЛЬ КОРЗИНЫ
   ================================================ */
.cart-panel {
    position: fixed;
    right: -420px;
    top: 0;
    width: 420px;
    height: 100vh;
    background: var(--c-surface-1);
    border-left: 1px solid var(--c-border);
    box-shadow: var(--shadow-panel);
    display: flex;
    flex-direction: column;
    transition: right var(--t-slow);
    z-index: 1000;
}

.cart-panel.open { right: 0; }

.cart-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid var(--c-border);
    background: var(--c-surface-2);
}

.cart-panel-header h2 {
    font-size: 17px;
    font-weight: 700;
    color: var(--c-text-1);
}

.close-cart {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--c-surface-3);
    border: 1px solid var(--c-border);
    border-radius: var(--r-sm);
    color: var(--c-text-2);
    font-size: 18px;
    cursor: pointer;
    transition: background var(--t-fast), color var(--t-fast);
}

.close-cart:hover { background: var(--c-red-soft); color: var(--c-red); }

.cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.cart-item {
    background: var(--c-surface-2);
    border: 1px solid var(--c-border);
    border-left: 3px solid var(--c-accent);
    border-radius: var(--r-md);
    padding: 14px;
    transition: border-color var(--t-fast);
}

.cart-item:hover { border-color: var(--c-border-hover); }

.cart-item-name {
    font-weight: 700;
    font-size: 14px;
    color: var(--c-text-1);
    margin-bottom: 4px;
}

.cart-item-price {
    font-size: 13px;
    color: var(--c-text-2);
    margin-bottom: 10px;
}

.cart-item-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
}

.quantity-btn {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--c-surface-3);
    border: 1px solid var(--c-border);
    border-radius: var(--r-sm);
    color: var(--c-text-1);
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: background var(--t-fast), border-color var(--t-fast);
}

.quantity-btn:hover { background: var(--c-accent-soft); border-color: var(--c-accent); }

.cart-item-qty {
    min-width: 44px;
    padding: 5px 8px;
    background: var(--c-surface-3);
    border: 1px solid var(--c-border);
    border-radius: var(--r-sm);
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    color: var(--c-text-1);
}

.cart-item-total {
    font-size: 14px;
    font-weight: 700;
    color: var(--c-text-1);
    text-align: right;
    margin-top: 6px;
}

.remove-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--c-text-3);
    padding: 5px 10px;
    border-radius: var(--r-sm);
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font);
    transition: background var(--t-fast), color var(--t-fast), border-color var(--t-fast);
}

.remove-btn:hover { background: var(--c-red-soft); color: var(--c-red); border-color: var(--c-red); }

.empty-cart {
    text-align: center;
    padding: 40px 20px;
    color: var(--c-text-3);
    font-size: 15px;
}

.cart-footer {
    padding: 14px 16px 18px;
    border-top: 1px solid var(--c-border);
    background: var(--c-surface-2);
}

.checkout-button {
    width: 100%;
    background: linear-gradient(135deg, var(--c-accent) 0%, #3d6d85 100%);
    border: none;
    color: #fff;
    padding: 0 20px;
    height: 62px;
    border-radius: var(--r-md);
    font-family: var(--font);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: opacity var(--t-base), box-shadow var(--t-base), transform var(--t-fast);
    box-shadow: 0 4px 20px rgba(91,143,168,0.45);
}

.checkout-button:hover {
    opacity: 0.93;
    box-shadow: 0 6px 28px rgba(91,143,168,0.6);
    transform: translateY(-1px);
}

.checkout-button:active { transform: translateY(0); }
.checkout-button:disabled { background: var(--c-surface-3); box-shadow: none; cursor: not-allowed; }

.checkout-btn-label {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.3px;
}

.checkout-btn-total {
    font-size: 18px;
    font-weight: 800;
    background: rgba(255,255,255,0.18);
    padding: 6px 14px;
    border-radius: var(--r-sm);
    letter-spacing: 0.3px;
}

/* ================================================
   ПАНЕЛЬ ИЗБРАННОГО
   ================================================ */
.favorites-panel {
    position: fixed;
    right: -440px;
    top: 0;
    width: 440px;
    height: 100vh;
    background: var(--c-surface-1);
    border-left: 1px solid rgba(224,82,82,0.25);
    box-shadow: var(--shadow-panel);
    display: flex;
    flex-direction: column;
    transition: right var(--t-slow);
    z-index: 1001;
}

.favorites-panel.open { right: 0; }

.favorites-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid rgba(224,82,82,0.2);
    background: var(--c-surface-2);
}

.favorites-panel-header h2 {
    font-size: 17px;
    font-weight: 700;
    color: var(--c-text-1);
}

.favorites-items {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.fav-item {
    background: var(--c-surface-2);
    border: 1px solid var(--c-border);
    border-left: 3px solid var(--c-red);
    border-radius: var(--r-md);
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color var(--t-fast);
}

.fav-item:hover { border-color: rgba(224,82,82,0.4); }

.fav-item-img {
    width: 60px;
    height: 60px;
    object-fit: contain;
    border-radius: var(--r-sm);
    background: var(--c-surface-1);
    flex-shrink: 0;
}

.fav-item-img-placeholder {
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    background: var(--c-surface-1);
    border-radius: var(--r-sm);
    flex-shrink: 0;
}

.fav-item-info { flex: 1; min-width: 0; }

.fav-item-name {
    font-weight: 700;
    font-size: 14px;
    color: var(--c-text-1);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.fav-item-price {
    font-size: 13px;
    color: var(--c-text-2);
    margin-bottom: 8px;
}

.fav-item-actions { display: flex; gap: 8px; }

.fav-qty-input {
    width: 52px;
    padding: 7px 4px;
    background: var(--c-surface-3);
    border: 1px solid var(--c-border);
    border-radius: var(--r-sm);
    font-size: 14px;
    font-family: var(--font);
    color: var(--c-text-1);
    text-align: center;
    transition: border-color var(--t-fast), box-shadow var(--t-fast);
    -moz-appearance: textfield;
    appearance: textfield;
}

.fav-qty-input::-webkit-inner-spin-button,
.fav-qty-input::-webkit-outer-spin-button {
    opacity: 1;
    height: 24px;
}

.fav-qty-input:focus {
    outline: none;
    border-color: var(--c-accent);
    box-shadow: var(--shadow-input);
}

.fav-add-btn {
    flex: 1;
    background: var(--c-accent-soft);
    border: 1px solid rgba(91,143,168,0.3);
    color: var(--c-text-1);
    padding: 7px 10px;
    border-radius: var(--r-sm);
    cursor: pointer;
    font-size: 13px;
    font-family: var(--font);
    font-weight: 600;
    transition: background var(--t-fast), border-color var(--t-fast);
}

.fav-add-btn:hover { background: rgba(91,143,168,0.28); border-color: var(--c-accent); }

.fav-remove-btn {
    background: var(--c-red-soft);
    border: 1px solid rgba(224,82,82,0.3);
    color: var(--c-red);
    padding: 7px 10px;
    border-radius: var(--r-sm);
    cursor: pointer;
    font-size: 13px;
    font-family: var(--font);
    transition: background var(--t-fast);
}

.fav-remove-btn:hover { background: rgba(224,82,82,0.25); }

.empty-favorites {
    text-align: center;
    padding: 48px 20px;
    color: var(--c-text-3);
    font-size: 14px;
    line-height: 1.8;
}

.empty-favorites .empty-fav-icon {
    font-size: 52px;
    display: block;
    margin-bottom: 14px;
    opacity: 0.3;
}

/* ================================================
   ОФОРМЛЕНИЕ ЗАКАЗА
   ================================================ */
.checkout-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
}

.checkout-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
}

.checkout-form-section,
.order-summary {
    background: var(--c-surface-1);
    border: 1px solid var(--c-border);
    border-radius: var(--r-lg);
    padding: 28px;
    box-shadow: var(--shadow-card);
}

.checkout-form-section h3,
.order-summary h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--c-text-1);
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--c-border);
}

.form-group { margin-bottom: 18px; }

.form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--c-text-2);
    margin-bottom: 7px;
    letter-spacing: 0.3px;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 11px 14px;
    background: var(--c-surface-2);
    border: 1px solid var(--c-border);
    border-radius: var(--r-sm);
    font-size: 14px;
    font-family: var(--font);
    color: var(--c-text-1);
    transition: border-color var(--t-fast), box-shadow var(--t-fast), background var(--t-fast);
    resize: vertical;
}

.form-group input:focus,
.form-group textarea:focus {
    outline: none;
    border-color: var(--c-accent);
    background: var(--c-surface-3);
    box-shadow: var(--shadow-input);
}

.submit-button {
    width: 100%;
    background: linear-gradient(135deg, var(--c-accent) 0%, #4a7a96 100%);
    border: none;
    color: #fff;
    padding: 15px;
    border-radius: var(--r-md);
    font-size: 15px;
    font-weight: 700;
    font-family: var(--font);
    cursor: pointer;
    transition: opacity var(--t-base), box-shadow var(--t-base), transform var(--t-fast);
    box-shadow: 0 4px 16px rgba(91,143,168,0.35);
    margin-top: 6px;
}

.submit-button:hover {
    opacity: 0.92;
    box-shadow: 0 6px 24px rgba(91,143,168,0.5);
    transform: translateY(-1px);
}

.order-summary { height: fit-content; }

#orderSummaryItems {
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--c-border);
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.summary-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    gap: 8px;
}

.summary-item-name { color: var(--c-text-1); flex: 1; }
.summary-item-qty { color: var(--c-text-3); font-size: 13px; flex-shrink: 0; }
.summary-item-price { color: var(--c-text-1); font-weight: 700; flex-shrink: 0; }

.order-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 18px;
    font-weight: 800;
    color: var(--c-text-1);
    padding-top: 12px;
}

/* ================================================
   МОДАЛЬНОЕ ОКНО
   ================================================ */
.modal {
    display: none;
    position: fixed;
    z-index: 3000;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
}

.modal.active {
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.25s ease;
}

.modal-content {
    background: var(--c-surface-2);
    border: 1px solid var(--c-border);
    padding: 44px 36px;
    border-radius: var(--r-xl);
    text-align: center;
    max-width: 420px;
    width: calc(100% - 32px);
    animation: slideUp 0.3s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
}

.modal-content h2 {
    font-size: 22px;
    font-weight: 800;
    color: var(--c-text-1);
    margin-bottom: 12px;
}

.modal-content p {
    font-size: 14px;
    color: var(--c-text-2);
    line-height: 1.7;
    margin-bottom: 8px;
}

.modal-buttons {
    display: flex;
    gap: 12px;
    margin-top: 28px;
}

.modal-buttons button {
    flex: 1;
    padding: 13px;
    border-radius: var(--r-md);
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    font-family: var(--font);
    transition: opacity var(--t-base), transform var(--t-fast);
}

.modal-btn-primary {
    background: linear-gradient(135deg, var(--c-accent) 0%, #4a7a96 100%);
    border: none;
    color: #fff;
    box-shadow: 0 4px 16px rgba(91,143,168,0.35);
}

.modal-btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

@keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
}

@keyframes slideUp {
    from { transform: translateY(32px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
}

/* ================================================
   ПОДСКАЗКИ ОПТОВОЙ ЦЕНЫ
   ================================================ */
.wholesale-hint {
    font-size: 12px;
    color: var(--c-text-3);
    margin-top: 6px;
    line-height: 1.4;
    transition: color var(--t-fast);
}

.wholesale-hint.reached {
    color: var(--c-green);
    font-weight: 600;
}

.wholesale-hint.close {
    color: #f0a030;
}

/* ================================================
   КНОПКА НАВЕРХ
   ================================================ */
.scroll-top-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 46px;
    height: 46px;
    border-radius: var(--r-full);
    background: var(--c-surface-2);
    border: 1px solid var(--c-border);
    color: var(--c-text-2);
    font-size: 20px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 900;
    transition: background var(--t-base), border-color var(--t-base), box-shadow var(--t-base), transform var(--t-fast);
    box-shadow: var(--shadow-card);
    line-height: 1;
}

.scroll-top-btn.visible { display: flex; }

.scroll-top-btn:hover {
    background: var(--c-accent-soft);
    border-color: var(--c-accent);
    color: var(--c-text-1);
    box-shadow: 0 0 20px var(--c-accent-glow);
    transform: translateY(-3px);
}

/* ================================================
   АНИМАЦИЯ ПОЯВЛЕНИЯ КАРТОЧЕК
   ================================================ */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}

.product-card,
.category-card {
    animation: fadeInUp 0.35s cubic-bezier(.4,0,.2,1) both;
}

.product-card:nth-child(1)  { animation-delay: 0.03s; }
.product-card:nth-child(2)  { animation-delay: 0.06s; }
.product-card:nth-child(3)  { animation-delay: 0.09s; }
.product-card:nth-child(4)  { animation-delay: 0.12s; }
.product-card:nth-child(5)  { animation-delay: 0.15s; }
.product-card:nth-child(6)  { animation-delay: 0.18s; }
.product-card:nth-child(n+7){ animation-delay: 0.20s; }

/* ================================================
   ПОДСВЕТКА НАЙДЕННОГО ТОВАРА
   ================================================ */
.product-card.highlight {
    animation: highlightPulse 1.8s ease;
    border-color: var(--c-accent) !important;
}

@keyframes highlightPulse {
    0%   { box-shadow: 0 0 0   0   var(--c-accent-glow); }
    30%  { box-shadow: 0 0 32px 8px var(--c-accent-glow); }
    100% { box-shadow: var(--shadow-card); }
}

/* ================================================
   ОВЕРЛЕЙ (при открытых панелях)
   ================================================ */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(2px);
    z-index: 999;
    display: none;
    animation: fadeIn 0.2s ease;
}

.overlay.active { display: block; }

/* ================================================
   МЕДИА-ЗАПРОСЫ
   ================================================ */

/* Планшет горизонтальный */
@media (max-width: 768px) {
    .container { display: block; padding: 16px; }
    .sidebar { display: none; }

    .categories-grid,
    .products-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
    }

    .category-image { height: 150px; }

    .cart-panel,
    .favorites-panel {
        width: 100%;
        right: -100%;
    }

    .checkout-container {
        grid-template-columns: 1fr;
        gap: 20px;
    }
}

/* Мобильная навигация по категориям */
.mobile-cats {
    display: none;
}

@media (max-width: 768px) {
    .mobile-cats {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 12px 16px;
        background: var(--c-surface-1);
        border-bottom: 1px solid var(--c-border);
        position: sticky;
        top: 57px;
        z-index: 40;
        scrollbar-width: none;
        -ms-overflow-style: none;
    }
    .mobile-cats::-webkit-scrollbar { display: none; }

    .mobile-cat-btn {
        flex-shrink: 0;
        padding: 7px 14px;
        background: var(--c-surface-2);
        border: 1px solid var(--c-border);
        border-radius: var(--r-full);
        color: var(--c-text-2);
        font-size: 13px;
        font-family: var(--font);
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        transition: background var(--t-fast), border-color var(--t-fast), color var(--t-fast);
    }

    .mobile-cat-btn:hover {
        background: var(--c-accent-soft);
        border-color: var(--c-accent);
        color: var(--c-text-1);
    }

    .mobile-cat-btn.active {
        background: var(--c-accent-soft);
        border-color: var(--c-accent);
        color: var(--c-text-1);
    }
}

/* Планшет вертикальный */
@media (min-width: 481px) and (max-width: 767px) {
    .categories-grid,

            <div id="categoryPage" class="page">
                <div class="category-header">
                    <button class="back-button" onclick="goHome()">← Назад</button>

                </div>
                <div class="products-grid" id="productsGrid"></div>
            </div>

                </div>
                <div class="checkout-container">
                    <div class="checkout-form-section">
                        <h3>Ваши данные</h3>
                        <form id="checkoutForm" onsubmit="submitOrder(event)">
                            <div class="form-group">
                                <label for="customerName">Ваше имя *</label>
                                <input type="text" id="customerName" required placeholder="Иван Петров">
                            </div>
                            <div class="form-group">
                                <label for="customerPhone">Телефон *</label>
                                <input type="tel" id="customerPhone" required placeholder="+996 555 123456">
                            </div>
                            <div class="form-group">
                                <label for="customerEmail">Email (опционально)</label>
                                <input type="email" id="customerEmail" placeholder="ваш@email.com">
                            </div>
                            <div class="form-group">
                                <label for="customerAddress">Адрес доставки</label>
                                <textarea id="customerAddress" placeholder="Адрес доставки" rows="3"></textarea>
                            </div>
                            <button type="submit" class="submit-button">Оформить заказ</button>
                        </form>
                    </div>
                    <div class="order-summary">
                        <h3>Корзина</h3>
                        <div id="orderSummaryItems"></div>
                        <div class="order-total">
                            <span>Итого:</span>
                            <span id="orderSummaryTotal">0 сом</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Оверлей -->
    <div id="overlay" class="overlay" onclick="closeAllPanels()"></div>

    <!-- Боковая панель корзины -->
    <div id="cartPanel" class="cart-panel">

            <h2>🛒 Корзина</h2>
            <button class="close-cart" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cartItems"></div>

        </div>
    </div>

    <!-- Кнопка Наверх -->
    <button class="scroll-top-btn" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Наверх">↑</button>

    <div class="qr-modal" id="qrModal" onclick="closeQrModal(event)">

// ЗАЩИТА ОТ XSS - ЭКРАНИРОВАНИЕ HTML
function escapeHtml(text) {
    if (!text) return '';
    const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    };
    return String(text).replace(/[&<>"']/g, m => map[m]);
}

// САНИТИЗАЦИЯ INPUT - УДАЛЕНИЕ ПОТЕНЦИАЛЬНО ОПАСНОГО КОДА
function sanitizeInput(input) {
    if (!input) return '';
    // Удаляем скрипты, события и опасные теги
    return escapeHtml(input).trim();
}

// ИНИЦИАЛИЗАЦИЯ
function init() {
    loadCategories();
    loadCart();
    loadFavorites();

    // Escape закрывает панели и поиск
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            closeAllPanels();
            clearSearch();
        }
    });

    // Регистрируем Service Worker для offline-режима
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(error => {
                console.warn('Service Worker registration failed:', error);
            });
        });
    }
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}

// КАТЕГОРИИ И ТОВАРЫ
function loadCategories() {
    const list = document.getElementById('categoriesList');
    list.innerHTML = '';

    const mobileCats = document.getElementById('mobileCats');
    mobileCats.innerHTML = '';

    categories.forEach(cat => {
        // Сайдбар
        const li = document.createElement('li');
        li.textContent = cat.name;
        li.dataset.id = cat.id;
        li.onclick = () => selectCategory(cat.id);
        list.appendChild(li);

        // Мобильные таблетки
        const btn = document.createElement('button');
        btn.className = 'mobile-cat-btn';
        btn.textContent = cat.name;
        btn.dataset.id = cat.id;
        btn.onclick = () => selectCategory(cat.id);
        mobileCats.appendChild(btn);
    });

    const grid = document.getElementById('categoriesGrid');
    grid.innerHTML = '';
    
    categories.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'category-card';
        div.onclick = () => selectCategory(cat.id);
        
        // Ищем первое фото в товарах этой категории
        let categoryImageHtml = '<div style="font-size:48px;display:flex;align-items:center;justify-content:center;width:100%;height:100%;">📦</div>';
        const categoryProducts = products[cat.id] || [];
        if (categoryProducts.length > 0) {
            const firstWithImage = categoryProducts.find(p => p.image);
            if (firstWithImage && firstWithImage.image) {
                const safeName = escapeHtml(cat.name);
                categoryImageHtml = `<img src="assets/images/${escapeHtml(firstWithImage.image)}" alt="Фото категории" style="max-width:100%;max-height:100%;object-fit:contain;">`;
            }
        }
        
        // Безопасно вставляем название и описание категории
        const imgDiv = document.createElement('div');
        imgDiv.className = 'category-image';
        imgDiv.innerHTML = categoryImageHtml;
        div.appendChild(imgDiv);
        
        const infoDiv = document.createElement('div');
        infoDiv.className = 'category-info';
        
        const titleH3 = document.createElement('h3');
        titleH3.textContent = cat.name;
        infoDiv.appendChild(titleH3);
        
        const descP = document.createElement('p');
        descP.textContent = cat.description;
        infoDiv.appendChild(descP);
        
        div.appendChild(infoDiv);
        grid.appendChild(div);
    });
}

function selectCategory(categoryId) {
    currentCategory = categoryId;

    // Синх боковой сайдбар
    document.querySelectorAll('.categories-list li').forEach((el, idx) => {
        el.classList.toggle('active', categories[idx].id === categoryId);
    });

    // Синх мобильных кнопок
    document.querySelectorAll('.mobile-cat-btn').forEach(btn => {
        const active = Number(btn.dataset.id) === categoryId;
        btn.classList.toggle('active', active);
        if (active) btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    });

    loadProducts(categoryId);

    document.getElementById('homePage').classList.remove('active');
    document.getElementById('checkoutPage').classList.remove('active');
    document.getElementById('categoryPage').classList.add('active');
}

function getWholesaleProgress(item, quantity) {
    const wholesaleFrom = Number(item.wholesaleFrom) || 0;
    const wholesalePrice = Number(item.priceWholesale) || 0;
    const qty = Math.max(1, parseInt(quantity) || 1);

    if (wholesalePrice <= 0 || wholesaleFrom <= 1) {
        return null;
    }

    if (qty >= wholesaleFrom) {
        return {
            text: '✅ Оптовая цена активна',
            isActive: true
        };
    }

    return {
        text: `До оптовой цены осталось ${wholesaleFrom - qty} шт.`,
        isActive: false
    };
}

function loadProducts(categoryId) {
    const categoryData = categories.find(c => c.id === categoryId);
    document.getElementById('categoryTitle').textContent = categoryData.name;

    const grid = document.getElementById('productsGrid');
    grid.innerHTML = '';

    let categoryProducts = [];
    if (categoryId === 0) {
        for (let catId in products) {
            categoryProducts = categoryProducts.concat(products[catId]);
        }
    } else {
        categoryProducts = products[categoryId] || [];
    }

    categoryProducts = categoryProducts.filter(product => {
        const hasPhoto = product.image && String(product.image).trim() !== '';
        const hasRetailPrice = product.priceRetail && product.priceRetail > 0;
        return hasPhoto && hasRetailPrice;
    });

    const fragment = document.createDocumentFragment();

    categoryProducts.forEach(product => {
        const div = document.createElement('div');
        div.className = 'product-card';
        
        const defaultQuantity = 1;
        const hasRetailPrice = product.priceRetail > 0;
        const isWholesale = defaultQuantity >= product.wholesaleFrom && product.priceWholesale > 0;
        const currentPrice = isWholesale ? product.priceWholesale : (hasRetailPrice ? product.priceRetail : 0);
        const showOriginal = isWholesale && hasRetailPrice && product.priceRetail !== product.priceWholesale;

        // Получаем картинку товара
        let imageHtml = '';
        if (product.image) {
            const safeName = escapeHtml(product.image);
            imageHtml = `<img src="assets/images/${safeName}" alt="Фото товара" loading="lazy" style="max-width:100%;max-height:100%;object-fit:contain;" onerror="this.closest('.product-card')?.remove();">`;
        }

        div.innerHTML = `
            <div class="product-image">${imageHtml}</div>
        `;

        // Кнопка избранного
        const favBtn = document.createElement('button');
        favBtn.className = 'fav-btn' + (favorites.includes(product.id) ? ' active' : '');
        favBtn.textContent = favorites.includes(product.id) ? '♥' : '♡';
        favBtn.title = 'В избранное';
        favBtn.onclick = (e) => { e.stopPropagation(); toggleFavorite(product.id, favBtn); };
        div.appendChild(favBtn);

        const infoDiv = document.createElement('div');
        infoDiv.className = 'product-info';
        div.appendChild(infoDiv);

        // Название товара
        const nameDiv = document.createElement('div');
        nameDiv.className = 'product-name';
        nameDiv.textContent = product.name;
        infoDiv.appendChild(nameDiv);

        // Описание товара
        const descDiv = document.createElement('div');
        descDiv.className = 'product-description';
        descDiv.textContent = product.description;
        infoDiv.appendChild(descDiv);

        // Цена
        const priceDiv = document.createElement('div');
        priceDiv.className = 'product-price';
        if (currentPrice > 0) {
            const priceSpan = document.createElement('span');
            priceSpan.textContent = currentPrice + ' сом';
            priceDiv.appendChild(priceSpan);
        } else {
            priceDiv.textContent = 'по запросу';
        }
        if (showOriginal && product.priceRetail > 0) {
            const originalSpan = document.createElement('span');
            originalSpan.className = 'product-price-original';
            originalSpan.textContent = product.priceRetail + ' сом';
            priceDiv.appendChild(originalSpan);
        }
        infoDiv.appendChild(priceDiv);

        // Оптовая цена
        const wholesaleDiv = document.createElement('div');
        wholesaleDiv.style.cssText = 'font-size: 12px; color: #b0b0b0; margin-bottom: 10px;';
        const wholesaleText = `От ${product.wholesaleFrom} шт. опт цена: ${product.priceWholesale && !isNaN(product.priceWholesale) ? product.priceWholesale + ' сом' : 'по запросу'}`;
        wholesaleDiv.textContent = wholesaleText;
        infoDiv.appendChild(wholesaleDiv);

        const wholesaleHintDiv = document.createElement('div');
        wholesaleHintDiv.className = 'wholesale-hint';
        wholesaleHintDiv.style.cssText = 'font-size: 12px; margin: -4px 0 10px;';
        const wholesaleProgress = getWholesaleProgress(product, defaultQuantity);
        if (wholesaleProgress) {
            wholesaleHintDiv.textContent = wholesaleProgress.text;
            wholesaleHintDiv.style.color = wholesaleProgress.isActive ? '#27ae60' : '#f39c12';
        } else {
            wholesaleHintDiv.style.display = 'none';
        }
        infoDiv.appendChild(wholesaleHintDiv);

        // Контролы
        const controlsDiv = document.createElement('div');
        controlsDiv.className = 'product-controls';
        controlsDiv.innerHTML = `
            <input type="number" class="quantity-input" value="1" min="1" max="999" oninput="updatePrice(this, ${product.id})" onchange="updatePrice(this, ${product.id})">
            <button class="add-to-cart-button" onclick="addToCart(${product.id}, this.parentElement.querySelector('.quantity-input').value, this)">
                В корзину
            </button>
        `;
        infoDiv.appendChild(controlsDiv);
        
        fragment.appendChild(div);
    });

    grid.appendChild(fragment);
}

function updatePrice(input, productId) {
    const quantity = Math.max(1, parseInt(input.value) || 1);
    input.value = quantity;
    
    let product = null;
    for (let catId in products) {
        product = products[catId].find(p => p.id === productId);
        if (product) break;
    }
    
    if (!product) return;

    const isWholesale = quantity >= product.wholesaleFrom && product.priceWholesale > 0;
    const currentPrice = isWholesale ? product.priceWholesale : (product.priceRetail || 0);
    
    const productInfo = input.closest('.product-controls')?.closest('.product-info');
    const priceDiv = productInfo?.querySelector('.product-price');
    if (!priceDiv) return;
    
    // БЕЗОПАСНО: используем textContent вместо innerHTML
    priceDiv.innerHTML = '';
    if (isNaN(currentPrice) || currentPrice === 0) {
        priceDiv.textContent = 'по запросу';
    } else {
        priceDiv.appendChild(document.createTextNode(`${currentPrice} сом`));
        if (isWholesale && product.priceRetail && !isNaN(product.priceRetail) && product.priceRetail > product.priceWholesale) {
            const span = document.createElement('span');
            span.className = 'product-price-original';
            span.textContent = `${product.priceRetail} сом`;
            priceDiv.appendChild(span);
        }
    }

    const wholesaleHintDiv = productInfo?.querySelector('.wholesale-hint');
    if (wholesaleHintDiv) {
        const wholesaleProgress = getWholesaleProgress(product, quantity);
        if (wholesaleProgress) {
            wholesaleHintDiv.style.display = 'block';
            wholesaleHintDiv.textContent = wholesaleProgress.text;
            wholesaleHintDiv.style.color = wholesaleProgress.isActive ? '#27ae60' : '#f39c12';
        } else {
            wholesaleHintDiv.style.display = 'none';
        }
    }
}

function loadFavorites() {

        const saved = localStorage.getItem('favorites');
        if (saved) {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed)) favorites = parsed;
        }
    } catch (e) {
        favorites = [];
    }
    updateFavoritesUI();
}

function saveFavorites() {
    localStorage.setItem('favorites', JSON.stringify(favorites));
}

function toggleFavorite(productId, btn) {
    const idx = favorites.indexOf(productId);
    if (idx === -1) {
        favorites.push(productId);
        if (btn) { btn.classList.add('active'); btn.textContent = '♥'; }
        showNotification('❤️ Добавлено в избранное', 'success');
    } else {
        favorites.splice(idx, 1);
        if (btn) { btn.classList.remove('active'); btn.textContent = '♡'; }
        showNotification('Убрано из избранного', 'info');

function toggleCart() {
    const cart = document.getElementById('cartPanel');
    const fav  = document.getElementById('favoritesPanel');

function addToCart(productId, quantity = 1, button = null) {
    quantity = Math.max(1, parseInt(quantity) || 1);

    if (button) {
        button.disabled = true;
        button.textContent = '⏳';
        button.classList.add('loading');
    }

    let product = null;
    for (let catId in products) {
        product = products[catId].find(p => p.id === productId);
        if (product) break;
    }
    
    if (!product) {
        if (button) {
            button.disabled = false;
            button.textContent = 'В корзину';
            button.classList.remove('loading');
        }
        showNotification('Ошибка при добавлении товара', 'error');
        return;
    }

    let cartItem = cart.find(item => item.id === productId);

    if (cartItem) {
        cartItem.quantity += quantity;
    } else {
        cart.push({
            id: product.id,
            name: product.name,
            priceRetail: product.priceRetail,
            priceWholesale: product.priceWholesale,
            wholesaleFrom: product.wholesaleFrom,
            quantity: quantity
        });
    }

    saveCart();
    updateCartUI();
    showNotification(`✨ ${product.name} добавлен в корзину!`, 'success');

    if (button) {
        setTimeout(() => {
            button.disabled = false;
            button.textContent = 'В корзину';
            button.classList.remove('loading');
        }, 500);
    }
}

function removeFromCart(productId) {
    cart = cart.filter(item => item.id !== productId);
    saveCart();
    updateCartUI();
}

function updateCartQuantity(productId, newQuantity) {
    newQuantity = Math.max(1, parseInt(newQuantity) || 1);
    
    const cartItem = cart.find(item => item.id === productId);
    if (cartItem) {
        cartItem.quantity = newQuantity;
        saveCart();
        updateCartUI();
    }
}

function updateCartUI() {
    const cartItemsDiv = document.getElementById('cartItems');
    const cartCount = document.getElementById('cartCount');
    const cartTotal = document.getElementById('cartTotal');

    const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
    cartCount.textContent = totalItems;
    cartCount.classList.remove('bounce');
    void cartCount.offsetWidth;
    cartCount.classList.add('bounce');

    if (cart.length === 0) {
        cartItemsDiv.innerHTML = '<div class="empty-cart">Корзина пуста</div>';
        cartTotal.textContent = '0 сом';
        return;
    }

    cartItemsDiv.innerHTML = '';
    let total = 0;

    cart.forEach(item => {
        const isWholesale = item.quantity >= item.wholesaleFrom && item.priceWholesale > 0;
        const price = isWholesale ? item.priceWholesale : item.priceRetail;
        const itemTotal = price * item.quantity;
        
        if (price > 0 && !isNaN(price)) {
            total += itemTotal;
        }

        const div = document.createElement('div');
        div.className = 'cart-item';
        
        // БЕЗОПАСНО: используем textContent для имена товара
        const nameDiv = document.createElement('div');
        nameDiv.className = 'cart-item-name';
        nameDiv.textContent = item.name;
        div.appendChild(nameDiv);
        
        const priceDiv = document.createElement('div');
        priceDiv.className = 'cart-item-price';
        priceDiv.appendChild(document.createTextNode(`Цена: ${isNaN(price) || price === 0 ? 'по запросу' : price + ' сом'} `));
        if (isWholesale) {
            const optSpan = document.createElement('span');
            optSpan.style.color = '#27ae60';
            optSpan.textContent = '(опт)';
            priceDiv.appendChild(optSpan);
        } else {
            priceDiv.appendChild(document.createTextNode('(розница)'));
        }
        div.appendChild(priceDiv);

        const wholesaleProgress = getWholesaleProgress(item, item.quantity);
        if (wholesaleProgress) {
            const wholesaleHintDiv = document.createElement('div');
            wholesaleHintDiv.style.cssText = 'font-size: 12px; margin-top: 4px;';
            wholesaleHintDiv.style.color = wholesaleProgress.isActive ? '#27ae60' : '#f39c12';
            wholesaleHintDiv.textContent = wholesaleProgress.text;
            div.appendChild(wholesaleHintDiv);
        }
        
        const controlsDiv = document.createElement('div');
        controlsDiv.className = 'cart-item-controls';
        
        const minusBtn = document.createElement('button');
        minusBtn.className = 'quantity-btn';
        minusBtn.textContent = '−';
        minusBtn.onclick = () => updateCartQuantity(item.id, item.quantity - 1);
        controlsDiv.appendChild(minusBtn);
        
        const qtyDiv = document.createElement('div');
        qtyDiv.className = 'cart-item-qty';
        qtyDiv.textContent = item.quantity;
        controlsDiv.appendChild(qtyDiv);
        
        const plusBtn = document.createElement('button');
        plusBtn.className = 'quantity-btn';
        plusBtn.textContent = '+';
        plusBtn.onclick = () => updateCartQuantity(item.id, item.quantity + 1);
        controlsDiv.appendChild(plusBtn);
        
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.textContent = 'Удалить';
        removeBtn.onclick = () => removeFromCart(item.id);
        controlsDiv.appendChild(removeBtn);
        
        div.appendChild(controlsDiv);
        
        const totalDiv = document.createElement('div');
        totalDiv.className = 'cart-item-total';
        totalDiv.textContent = `Итого: ${isNaN(itemTotal) || itemTotal === 0 ? 'по запросу' : itemTotal + ' сом'}`;
        div.appendChild(totalDiv);
        
        cartItemsDiv.appendChild(div);
    });

    cartTotal.textContent = total > 0 ? total + ' сом' : '0 сом';
}

function saveCart() {
    try {
        // ЗАЩИТА: проверяем размер данных (макс 5MB для localStorage)
        const cartData = JSON.stringify(cart);
        if (cartData.length > 5242880) {
            console.error('Корзина слишком большая');
            return;
        }
        localStorage.setItem('cart', cartData);
    } catch (error) {
        console.error('Ошибка сохранения корзины:', error);
        // Очищаем если переполнение
        if (error.name === 'QuotaExceededError') {
            localStorage.removeItem('cart');
        }
    }
}

function loadCart() {
    try {
        const saved = localStorage.getItem('cart');
        if (saved) {
            const parsed = JSON.parse(saved);
            // ЗАЩИТА: проверяем что это массив
            if (Array.isArray(parsed)) {
                cart = parsed;
                updateCartUI();
            } else {
                console.warn('Некорректные данные корзины');
                cart = [];
            }
        }
    } catch (error) {
        console.error('Ошибка загрузки корзины:', error);
        // Если данные повреждены - очищаем
        localStorage.removeItem('cart');
        cart = [];
        updateCartUI();
    }
}

// ОФОРМЛЕНИЕ ЗАКАЗА
function formatOrderText(customerData) {
    // Экранируем все пользовательские данные для безопасности
    const safeCustomerName = (customerData.name || '').replace(/[_*[\]()~`>#+-=|{}.!]/g, '\\$&');
    const safePhone = (customerData.phone || '').replace(/[_*[\]()~`>#+-=|{}.!]/g, '\\$&');
    const safeEmail = (customerData.email || 'не указан').replace(/[_*[\]()~`>#+-=|{}.!]/g, '\\$&');
    const safeAddress = (customerData.address || 'не указан').replace(/[_*[\]()~`>#+-=|{}.!]/g, '\\$&');
    
    let text = '*📋 НОВЫЙ ЗАКАЗ*\n\n';
    text += `*Клиент:* ${safeCustomerName}\n`;
    text += `*Телефон:* ${safePhone}\n`;
    text += `*Email:* ${safeEmail}\n`;
    text += `*Адрес:* ${safeAddress}\n`;
    text += `*Время:* ${new Date().toLocaleString('ru-RU')}\n`;
    text += '\n*Товары:*\n';
    
    let totalAmount = 0;
    
    cart.forEach(item => {
        const qty = item.quantity || 1;
        const retailPrice = item.priceRetail || 0;
        const wholesalePrice = item.priceWholesale || 0;
        const isWholesale = qty >= (item.wholesaleFrom || 1) && wholesalePrice > 0;
        const currentPrice = isWholesale ? wholesalePrice : retailPrice;
        const itemTotal = currentPrice * qty;
        
        // Экранируем название товара для WhatsApp
        const safeItemName = (item.name || '').replace(/[_*[\]()~`>#+-=|{}.!]/g, '\\$&');
        
        text += `• ${safeItemName}\n`;
        text += `  Кол-во: ${qty}\n`;

        if (currentPrice > 0) {
            text += `  Цена: ${currentPrice} сом ${isWholesale ? '(опт)' : '(розница)'}\n`;
            text += `  Сумма: ${itemTotal} сом\n`;
            totalAmount += itemTotal;
        } else {
            text += '  Цена: по запросу\n';
        }
        text += '\n';
    });
    
    text += '---\n';
    text += `*Итого к оплате:* ${totalAmount > 0 ? totalAmount + ' сом' : 'по запросу'}\n`;
    
    return encodeURIComponent(text);
}

function sendWhatsAppToOwner(customerData) {
    const messageText = formatOrderText(customerData);
    const whatsappURL = `https://wa.me/${OWNER_PHONE}?text=${messageText}`;
    const popup = window.open(whatsappURL, '_blank');
    return !!popup;
}

function submitOrder(event) {
    event.preventDefault();
    
    // САНИТИЗАЦИЯ ДАННЫХ - удаляем потенциально опасный код
    const customerData = {
        name: sanitizeInput(document.getElementById('customerName').value),
        phone: sanitizeInput(document.getElementById('customerPhone').value),
        email: sanitizeInput(document.getElementById('customerEmail').value),
        address: sanitizeInput(document.getElementById('customerAddress').value)
    };
    
    if (!customerData.name || !customerData.phone) {
        showNotification('⚠️ Заполните обязательные поля', 'error');
        return;
    }
    
    // ВАЛИДАЦИЯ ИМЕНИ - только буквы, цифры, пробелы, дефисы
    if (!/^[а-яА-ЯёЁa-zA-Z0-9\s\-]{2,100}$/.test(customerData.name)) {
        showNotification('⚠️ Имя содержит недопустимые символы', 'error');
        return;
    }
    
    // ВАЛИДАЦИЯ ТЕЛЕФОНА
    const phoneDigits = customerData.phone.replace(/\D/g, '');
    if (!phoneDigits.startsWith('996') && !phoneDigits.startsWith('7')) {
        showNotification('☎️ Номер должен начинаться с +996 или +7', 'error');
        return;
    }
    if (phoneDigits.length < 10 || phoneDigits.length > 15) {
        showNotification('☎️ Номер телефона введен некорректно', 'error');
        return;
    }
    
    // ВАЛИДАЦИЯ EMAIL если заполнен
    if (customerData.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(customerData.email)) {
        showNotification('⚠️ Проверьте корректность email', 'error');
        return;
    }

    // СОХРАНЕНИЕ ЗАКАЗА
    try {
        const orders = JSON.parse(localStorage.getItem('orders') || '[]');
        orders.push({
            ...customerData,
            items: JSON.parse(JSON.stringify(cart)),
            timestamp: new Date().toISOString()
        });
        localStorage.setItem('orders', JSON.stringify(orders));
    } catch (error) {
        console.error('Ошибка сохранения заказа:', error);
    }

    // ОТПРАВКА ЧЕК В WHATSAPP
    let whatsappSent = false;
    try {
        whatsappSent = sendWhatsAppToOwner(customerData);
    } catch (error) {
        console.error('Ошибка при отправке в WhatsApp:', error);
    }

    // ПОКАЗЫВАЕМ СООБЩЕНИЕ УСПЕХА (безопасно - используем textContent)
    document.getElementById('modalMessage').textContent = whatsappSent
        ? `Спасибо, ${customerData.name}! Ваш заказ принят. Чек отправлен в WhatsApp. Мы свяжемся с вами по номеру ${customerData.phone}.`
        : `Спасибо, ${customerData.name}! Ваш заказ принят. Не удалось автоматически открыть WhatsApp — проверьте блокировку всплывающих окон. Мы свяжемся с вами по номеру ${customerData.phone}.`;
    document.getElementById('successModal').classList.add('active');
}

function completeOrder() {
    cart = [];
    saveCart();
    updateCartUI();
    document.getElementById('successModal').classList.remove('active');
    document.getElementById('checkoutPage').classList.remove('active');
    document.getElementById('homePage').classList.add('active');
    document.getElementById('checkoutForm').reset();
}

function showNotification(message, type = 'success') {
    const colors = {
        success: '#27ae60',
        error:   '#e74c3c',
        info:    '#3498db'
    };

    // Смещаем вниз уже существующие нотификации
    document.querySelectorAll('.site-notification').forEach(n => {
        n.style.top = (parseInt(n.style.top) + 58) + 'px';
    });

    const notification = document.createElement('div');
    notification.className = 'site-notification';
    notification.style.cssText = `
        position: fixed;
        top: 80px;
        right: 20px;
        background: ${colors[type] || colors.success};
        color: #fff;
        padding: 12px 18px;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        z-index: 4000;
        max-width: 300px;
        font-size: 14px;
        font-weight: 600;
        transition: top 0.25s ease;
        animation: notifSlideIn 0.28s ease;
    `;
    notification.textContent = message;
    document.body.appendChild(notification);

    setTimeout(() => {
        notification.style.opacity = '0';
        notification.style.transform = 'translateX(20px)';
        notification.style.transition = 'opacity 0.25s, transform 0.25s';
        setTimeout(() => notification.remove(), 260);
    }, 2800);
}

// QR-КОД
function openQrModal() {
    const url = window.location.href.split('?')[0].split('#')[0];
    const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=360x360&margin=2&data=${encodeURIComponent(url)}`;
    document.getElementById('qrImage').src = qrApi;
    document.getElementById('qrUrl').textContent = url;
    document.getElementById('qrModal').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeQrModal(e) {
    if (e && e.target !== document.getElementById('qrModal')) return;
    document.getElementById('qrModal').classList.remove('active');
    document.body.style.overflow = '';
}

function copyUrl() {
    const url = document.getElementById('qrUrl').textContent;
    navigator.clipboard?.writeText(url).then(() => {
        showNotification('🔗 Ссылка скопирована!', 'success');
    });
}

function shareWhatsApp() {
    const url = document.getElementById('qrUrl').textContent;
    window.open(`https://wa.me/?text=${encodeURIComponent('🛍️ KOSMOS — Магазин\n' + url)}`, '_blank');
}

// КНОПКА НАВЕРХ
window.addEventListener('scroll', () => {
    const btn = document.getElementById('scrollTopBtn');
    if (btn) btn.classList.toggle('visible', window.scrollY > 300);
}, { passive: true });

// Закрываем панель поиска при клике вне неё
document.addEventListener('click', (e) => {
    const wrap = document.querySelector('.search-wrap');
    if (wrap && !wrap.contains(e.target)) closeSearchPanel();
});

// ПОИСК
let searchTimeout = null;

function handleSearch(query) {
    const clearBtn = document.getElementById('searchClear');
    if (clearBtn) clearBtn.classList.toggle('visible', query.length > 0);
    clearTimeout(searchTimeout);
    if (!query.trim()) { closeSearchPanel(); return; }
    searchTimeout = setTimeout(() => renderSearchResults(query.trim()), 120);
}

function clearSearch() {
    const input = document.getElementById('searchInput');
    if (input) { input.value = ''; input.focus(); }
    document.getElementById('searchClear')?.classList.remove('visible');
    closeSearchPanel();
}

function closeSearchPanel() {
    const panel = document.getElementById('searchPanel');
    if (panel) panel.classList.remove('open');
}

function renderSearchResults(query) {
    const panel = document.getElementById('searchPanel');
    if (!panel) return;

    const q = query.toLowerCase();
    const results = [];

    // Категория id -> название
    const catNames = {};
    categories.forEach(c => { catNames[c.id] = c.name; });

    for (let catId in products) {
        products[catId].forEach(product => {
            if (!product.priceRetail || product.priceRetail === 0) return;
            if (product.name.toLowerCase().includes(q)) {
                results.push({ product, catId });
            }
        });
    }

    panel.innerHTML = '';

    if (results.length === 0) {
        panel.innerHTML = '<div class="search-empty">😕 Ничего не найдено</div>';
        panel.classList.add('open');
        return;
    }

    const countDiv = document.createElement('div');
    countDiv.className = 'search-count';
    countDiv.textContent = `Найдено: ${results.length} товаров`;
    panel.appendChild(countDiv);

    results.slice(0, 30).forEach(({ product, catId }) => {
        const item = document.createElement('div');
        item.className = 'search-result-item';
        item.onclick = () => { openProductFromSearch(product, parseInt(catId)); };

        // Картинка
        if (product.image) {
            const img = document.createElement('img');
            img.className = 'search-result-img';
            img.src = 'assets/images/' + escapeHtml(product.image);
            img.loading = 'lazy';
            img.alt = '';
            img.onerror = () => img.style.display = 'none';
            item.appendChild(img);
        } else {
            const ph = document.createElement('div');
            ph.className = 'search-result-placeholder';
            ph.textContent = '📦';
            item.appendChild(ph);
        }

        const info = document.createElement('div');
        info.style.flex = '1';

        // Название с подсветкой
        const nameDiv = document.createElement('div');
        nameDiv.className = 'search-result-name';
        const regex = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        nameDiv.innerHTML = escapeHtml(product.name).replace(regex, '<mark>$1</mark>');
        info.appendChild(nameDiv);

        const priceDiv = document.createElement('div');
        priceDiv.className = 'search-result-price';
        priceDiv.textContent = product.priceRetail + ' сом' +
            (product.priceWholesale > 0 ? ` · Опт от ${product.wholesaleFrom} шт: ${product.priceWholesale} сом` : '');
        info.appendChild(priceDiv);

        const catDiv = document.createElement('div');
        catDiv.className = 'search-result-cat';
        catDiv.textContent = catNames[catId] || '';
        info.appendChild(catDiv);

        item.appendChild(info);
        panel.appendChild(item);
    });

    panel.classList.add('open');
}

function openProductFromSearch(product, catId) {
    clearSearch();
    // Переходим в категорию и скроллим к товару
    selectCategory(catId);
    // После рендера ищем карточку товара и скроллим к ней
    setTimeout(() => {
        const cards = document.querySelectorAll('.product-card');
        for (let card of cards) {
            const nameEl = card.querySelector('.product-name');
            if (nameEl && nameEl.textContent.trim() === product.name.trim()) {
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                card.style.transition = 'box-shadow 0.3s';
                card.style.boxShadow = '0 0 30px rgba(83,180,255,0.7)';
                setTimeout(() => { card.style.boxShadow = ''; }, 1800);
                break;
            }
        }
    }, 200);
}
